<!DOCTYPE html>
<html>
    <head>
        <title>AI Chat</title>
        <link rel="stylesheet" href="duh.css">
        <link rel="stylesheet" href="chat_style.css">
    </head>
    <body>
        <header>
            <a href="index.html" class="home">Utterly Unusable AI </a>
        </header>
        <main>
            <h2>Chat</h2>
            <p>
                Do you want to feel like you are talking to a <b>real life</b> AI? <br>
                With the least resources spent on our part, this chat is the best illusion! <br>
                Warning: You may not like the responses.
            </p>
            <div class="chat-window">
                <div class="messages" id="messages">
                    <div class="message other">Hello! 👋</div>
                </div>
                <div class="input-area">
                    <input type="text" id="chatInput" placeholder="Type a message...">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>
        </main>
        <script src="AI_Chat.js"></script>
    </body>
</html>
